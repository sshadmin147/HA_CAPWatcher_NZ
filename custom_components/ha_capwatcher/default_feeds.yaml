  - name: region_marlborough
    label: "Official — Marlborough"
    url: "https://alerts.sshadmin.dev/cap/feeds/official/regions/marlborough"
    enabled: false

  - name: region_west_coast
    label: "Official — West Coast"
    url: "https://alerts.sshadmin.dev/cap/feeds/official/regions/west_coast"
